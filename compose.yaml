services:

  valkey:
    image: valkey/valkey:latest
    container_name: lts-valkey
    restart: always
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - ./data/valkey:/data
    command:
      - "valkey-server"
      - "--bind"
      - "${VALKEY_HOST}"
      - "--port"
      - "${VALKEY_PORT}"
      - "--protected-mode"
      - "yes"
      - "--requirepass"
      - "${VALKEY_PASSWORD}"
      - "--dir"
      - "/data"
    env_file:
      - .env
    networks:
      - lts_network
    healthcheck:
      test: ["CMD", "valkey-cli", "--no-auth-warning", "--pass", "${VALKEY_PASSWORD}", "-h", "${VALKEY_HOST}", "-p", "${VALKEY_PORT}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:latest
    container_name: lts-postgres
    restart: always
    env_file:
      - .env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-54321}:5432"
    volumes:
      - ./data/pg:/var/lib/postgresql/data/pgdata
    networks:
      - lts_network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: laptopcoder/lts-service-backend:latest
    container_name: lts-backend
    restart: always
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - /etc/localtime:/etc/localtime
      - ./data/storage:/backend/data/storage
    environment:
      - PATH_TO_STORAGE=/backend/data/storage
      - POSTGRES_HOST=postgres
      - JWT_ISSUER_PREFIX=lts-backend
    env_file:
      - .env
    networks:
      - lts_network
    ports:
      - "37190:37190"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://${BACKEND_HOST}:${BACKEND_PORT}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: laptopcoder/lts-service-migrate:latest
    container_name: lts-migrate
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - POSTGRES_HOST=postgres
    profiles: ["migrate"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: laptopcoder/lts-service-frontend:latest
    container_name: lts-frontend
    restart: always
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - /etc/localtime:/etc/localtime
      - ./data/storage:/usr/share/nginx/html/storage/storage
    env_file:
      - .env
    networks:
      - lts_network
    ports:
      - "${FRONTEND_PORT:-31022}:${FRONTEND_PORT:-31022}"
    depends_on:
      backend:
        condition: service_healthy

networks:
  lts_network:
    driver: bridge
