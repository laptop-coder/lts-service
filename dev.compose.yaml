services:

  valkey:
    image: valkey/valkey:latest
    container_name: lts-valkey
    restart: unless-stopped
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - ./data/valkey:/data
    command:
      - "valkey-server"
      - "--bind"
      - "${VALKEY_HOST}"
      - "--port"
      - "${VALKEY_PORT}"
      - "--protected-mode"
      - "yes"
      - "--requirepass"
      - "${VALKEY_PASSWORD}"
      - "--dir"
      - "/data"
    env_file:
      - .env
    networks:
      - lts_network
    healthcheck:
      test: ["CMD", "valkey-cli", "--no-auth-warning", "--pass", "${VALKEY_PASSWORD}", "-h", "${VALKEY_HOST}", "-p", "${VALKEY_PORT}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:latest
    container_name: lts-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-54321}:5432"
    volumes:
      - ./data/pg:/var/lib/postgresql/data/pgdata
    networks:
      - lts_network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: lts-backend
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime
      - ./data/db:/backend/data/db
      - ./data/env:/env
      - ./data/storage:/backend/data/storage
    environment:
      - PATH_TO_DB=/backend/data/db/db.sqlite3
      - PATH_TO_ENV=/env
      - PATH_TO_STORAGE=/backend/data/storage
      - RSA_PRIVATE_KEY=RSA_private_key.pem
      - RSA_PUBLIC_KEY=RSA_public_key.pem
      - POSTGRES_HOST=postgres
      - JWT_ISSUER_PREFIX=lts-backend
    env_file:
      - .env
    networks:
      - lts_network
    ports:
      - "37190:37190"
    depends_on:
      postgres:
        condition: service_started
      valkey:
        condition: service_started
      mailhog:
        condition: service_started
    develop:
      watch:
        - action: rebuild
          path: ./backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://${BACKEND_HOST}:${BACKEND_PORT}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.migrate
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    environment:
      - POSTGRES_HOST=postgres
    profiles: ["migrate"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lts_network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: lts-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_HTTP_PORT:-8025}:8025"
    env_file:
      - .env
    networks:
      - lts_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: lts-frontend
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime
      - ./data/env:/env
      - ./data/storage:/usr/share/nginx/html/storage/storage
    env_file:
      - .env
    networks:
      - lts_network
    ports:
      - "${FRONTEND_PORT:-31022}:${FRONTEND_PORT:-31022}"
    depends_on:
      - backend
    develop:
      watch:
        - action: rebuild
          path: ./frontend

networks:
  lts_network:
    driver: bridge
